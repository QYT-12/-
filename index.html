<form action="https://formsubmit.co/2374107977@qq.com" method="POST">
    <!-- 举报类型 -->
    <div class="form-group">
        <label for="type">举报类型 *</label>
        <select id="type" name="type" required>
            <option value="">请选择举报类型</option>
            <option value="校园欺凌">校园欺凌</option>
            <option value="校园暴力">校园暴力</option>
            <option value="不文明行为">不文明行为</option>
            <option value="违规违纪">违规违纪</option>
            <option value="其他">其他问题</option>
        </select>
    </div>

    <!-- 被举报人/地点 -->
    <div class="form-group">
        <label for="target">被举报人/事件地点 *</label>
        <input type="text" id="target" name="target" placeholder="例如：XX班XXX / 操场XX角落" required>
    </div>

    <!-- 举报人（可选） -->
    <div class="form-group">
        <label for="name">你的姓名（可选，可匿名）</label>
        <input type="text" id="name" name="name" placeholder="不想透露可不填">
    </div>

    <!-- 联系方式（可选） -->
    <div class="form-group">
        <label for="contact">联系方式（可选，方便后续沟通）</label>
        <input type="text" id="contact" name="contact" placeholder="例如：QQ/手机号">
    </div>

    <!-- 举报详情 -->
    <div class="form-group">
        <label for="message">事件详情 *</label>
        <textarea id="message" name="message" placeholder="请详细描述事情经过、时间、具体情况，越详细越好..." required></textarea>
    </div>

    <!-- 提交后跳转配置 -->
    <input type="hidden" name="_next" value="https://qyt-12.github.io/success.html">
    <input type="hidden" name="_captcha" value="false">

    <button type="submit">提交举报</button>
</form>
